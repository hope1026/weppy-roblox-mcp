name: Install Script E2E Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-bash:
    name: E2E — install.sh (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude Code CLI (app detection용)
        run: npm install -g @anthropic-ai/claude-code

      - name: Stub codex CLI binary (force CLI detection path)
        run: |
          # Stub `codex` so install.sh hits the CLI detection branch.
          # Implements `codex mcp add NAME -- CMD ARGS...` by appending a
          # [mcp_servers.NAME] block to ~/.codex/config.toml so the post-install
          # verification step (and is_codex_config_configured) can see it.
          sudo tee /usr/local/bin/codex > /dev/null <<'EOF'
          #!/usr/bin/env bash
          set -e
          if [ "${1:-}" = "mcp" ] && [ "${2:-}" = "add" ]; then
            shift 2
            name="$1"; shift
            [ "${1:-}" = "--" ] && shift
            cmd="$1"; shift
            args_json=""
            for a in "$@"; do
              args_json="${args_json}\"$a\", "
            done
            args_json="${args_json%, }"
            mkdir -p "$HOME/.codex"
            {
              printf '\n[mcp_servers.%s]\n' "$name"
              printf 'command = "%s"\n' "$cmd"
              printf 'args = [%s]\n' "$args_json"
            } >> "$HOME/.codex/config.toml"
            exit 0
          fi
          # Other subcommands (list/remove) are no-ops for the CI stub.
          exit 0
          EOF
          sudo chmod +x /usr/local/bin/codex

      - name: Run install.sh (CI mode, pipe — simulates curl | bash)
        env:
          CI: true
        run: |
          cat install.sh | bash 2>&1 | tee install-output.log
          if grep -q 'SyntaxError' install-output.log; then
            echo "❌ SyntaxError detected in install output"
            exit 1
          fi

      - name: Verify — plugin file exists
        run: |
          PLUGIN_PATH="$HOME/Documents/Roblox/Plugins/WeppyRobloxMCP.rbxm"
          if [ ! -f "$PLUGIN_PATH" ]; then
            echo "❌ Plugin not found: $PLUGIN_PATH"
            exit 1
          fi
          echo "✓ Plugin found: $PLUGIN_PATH"

      - name: Verify — Claude Code config registered
        run: |
          result=$(claude mcp list 2>&1)
          if ! echo "$result" | grep -q 'weppy-roblox-mcp'; then
            echo "❌ weppy-roblox-mcp not found in claude mcp list"
            echo "Output: $result"
            exit 1
          fi
          echo "✓ weppy-roblox-mcp registered"

      - name: Verify — Codex config registered
        run: |
          if ! grep -q '\[mcp_servers.weppy-roblox-mcp\]' "$HOME/.codex/config.toml"; then
            echo "❌ weppy-roblox-mcp not found in ~/.codex/config.toml"
            cat "$HOME/.codex/config.toml"
            exit 1
          fi
          echo "✓ weppy-roblox-mcp registered in Codex config"

      - name: Verify — MCP server responds to initialize + tools/list
        env:
          MCP_TIMEOUT: '90000'
        run: node .github/scripts/mcp-smoke.mjs

  test-powershell:
    name: E2E — install.ps1 (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude Code CLI (app detection용)
        run: npm install -g @anthropic-ai/claude-code

      - name: Stub codex CLI binary (force CLI detection path)
        shell: pwsh
        run: |
          # Stub `codex` so install.ps1 hits the CLI detection branch.
          # Delegates to a PowerShell helper that appends a [mcp_servers.NAME]
          # block to ~/.codex/config.toml when invoked with `mcp add ...`.
          $stubDir = Join-Path $env:RUNNER_TEMP 'codex-stub'
          New-Item -ItemType Directory -Path $stubDir -Force | Out-Null

          # Use $StubArgs (not $Args) — $Args is an automatic PowerShell variable
          # and binding it via param triggers a parameter-binding error on pwsh 7.
          $stubPs1 = @'
          param([Parameter(ValueFromRemainingArguments = $true)] [string[]] $StubArgs)
          if ($null -ne $StubArgs -and $StubArgs.Count -ge 2 -and $StubArgs[0] -eq 'mcp' -and $StubArgs[1] -eq 'add') {
            $rest = $StubArgs[2..($StubArgs.Count - 1)]
            $name = $rest[0]
            $idx = 1
            if ($rest.Count -gt 1 -and $rest[1] -eq '--') { $idx = 2 }
            $cmd = $rest[$idx]
            $cmdArgs = if (($idx + 1) -lt $rest.Count) { $rest[($idx + 1)..($rest.Count - 1)] } else { @() }
            $argsJson = ($cmdArgs | ForEach-Object { '"' + $_ + '"' }) -join ', '
            $codexDir = Join-Path $env:USERPROFILE '.codex'
            New-Item -ItemType Directory -Path $codexDir -Force | Out-Null
            $configPath = Join-Path $codexDir 'config.toml'
            $block = "`n[mcp_servers.$name]`ncommand = `"$cmd`"`nargs = [$argsJson]`n"
            Add-Content -Path $configPath -Value $block
          }
          exit 0
          '@
          Set-Content -Path (Join-Path $stubDir 'codex-stub.ps1') -Value $stubPs1 -Encoding UTF8

          $stubCmd = "@echo off`r`npwsh -NoProfile -ExecutionPolicy Bypass -File `"$stubDir\codex-stub.ps1`" %*"
          Set-Content -Path (Join-Path $stubDir 'codex.cmd') -Value $stubCmd -Encoding ASCII
          Add-Content -Path $env:GITHUB_PATH -Value $stubDir

      - name: Run install.ps1 (CI mode, pipe — simulates irm | iex)
        env:
          CI: true
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'install-output.log'
          Get-Content install.ps1 -Raw | Invoke-Expression *>&1 | Tee-Object -FilePath $log
          if (Select-String -Path $log -Pattern 'SyntaxError' -Quiet) {
            Write-Error "❌ SyntaxError detected in install output"
            exit 1
          }

      - name: Verify — plugin file exists
        shell: pwsh
        run: |
          $pluginPath = Join-Path $env:LOCALAPPDATA "Roblox\Plugins\WeppyRobloxMCP.rbxm"
          if (-not (Test-Path $pluginPath)) {
            Write-Error "❌ Plugin not found: $pluginPath"
            exit 1
          }
          Write-Host "✓ Plugin found: $pluginPath"

      - name: Verify — Claude Code config registered
        shell: pwsh
        run: |
          # claude mcp add는 ~/.claude.json에, 폴백은 ~/.claude/mcp.json에 씁니다
          $found = $false
          @("$env:USERPROFILE\.claude.json", "$env:USERPROFILE\.claude\mcp.json") | ForEach-Object {
            if ((Test-Path $_) -and ((Get-Content $_ -Raw) -match 'weppy-roblox-mcp')) {
              $found = $true
            }
          }
          if (-not $found) {
            Write-Error "❌ weppy-roblox-mcp not found in claude config files"
            exit 1
          }
          Write-Host "✓ weppy-roblox-mcp registered"

      - name: Verify — Codex config registered
        shell: pwsh
        run: |
          $codexConfig = Join-Path $env:USERPROFILE '.codex\config.toml'
          if (-not ((Get-Content $codexConfig -Raw) -match '\[mcp_servers\.weppy-roblox-mcp\]')) {
            Write-Error "❌ weppy-roblox-mcp not found in ~/.codex/config.toml"
            Get-Content $codexConfig
            exit 1
          }
          Write-Host "✓ weppy-roblox-mcp registered in Codex config"

      - name: Verify — MCP server responds to initialize + tools/list
        shell: pwsh
        env:
          MCP_TIMEOUT: '90000'
        run: node .github/scripts/mcp-smoke.mjs
